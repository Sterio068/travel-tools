name: CI

on:
  push:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_BROWSERS_PATH: /Volumes/CODEX/Workspace/Toolchains/ms-playwright
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test --if-present

      - name: Build
        run: npm run build

      - name: Lighthouse CI
        run: |
          npm run start -- --hostname 127.0.0.1 --port 3000 &
          npx --yes wait-on http://127.0.0.1:3000
          npx --yes @lhci/cli autorun --config=.lighthouserc.json

